<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영화 무대인사/시사회 알림</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif; background: #f0f0f0; padding: 20px; color: #333; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 28px 24px; text-align: center; border-radius: 12px 12px 0 0; }
    .header h1 { font-size: 22px; letter-spacing: -0.5px; }
    .header p { margin-top: 6px; font-size: 13px; color: #aab4c4; }
    .content { background: white; padding: 20px 16px; border-radius: 0 0 12px 12px; }
    .event-card { border: 1px solid #e8e8e8; border-radius: 10px; padding: 18px; margin-bottom: 14px; }
    .event-card:last-child { margin-bottom: 0; }
    .badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; color: white; font-weight: bold; margin-bottom: 10px; }
    .badge-stage { background: #e74c3c; }
    .badge-preview { background: #3498db; }
    .badge-other { background: #7f8c8d; }
    .title { font-size: 17px; font-weight: bold; margin-bottom: 10px; color: #1a1a2e; line-height: 1.4; }
    .info { font-size: 14px; color: #555; margin-bottom: 5px; line-height: 1.5; }
    .actors { font-size: 14px; color: #555; margin-top: 8px; }
    .btn { display: inline-block; margin-top: 14px; padding: 9px 22px; background: #e74c3c; color: white; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: bold; }
    .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 16px; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎬 영화 무대인사/시사회 알림</h1>
      <p>새로운 행사 {{count}}건이 등록되었습니다</p>
    </div>
    <div class="content">
      {{events}}
    </div>
    <div class="footer">
      <p>Movie Preview Alarm v3</p>
      <p>자동 발송된 메일입니다</p>
    </div>
  </div>
</body>
</html>
