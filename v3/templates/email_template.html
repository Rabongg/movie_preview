<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영화 무대인사/시사회 알림</title>
</head>
<body style="margin:0; padding:20px; background:#f0f0f0; font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif; color:#333;">
  <div style="max-width:600px; margin:0 auto;">

    <!-- 헤더 -->
    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e); color:white; padding:28px 24px; text-align:center; border-radius:12px 12px 0 0;">
      <div style="font-size:22px; font-weight:bold; letter-spacing:-0.5px;">🎬 영화 무대인사/시사회 알림</div>
      <div style="margin-top:6px; font-size:13px; color:#aab4c4;">새로운 행사 {{count}}건이 등록되었습니다</div>
    </div>

    <!-- 본문 -->
    <div style="background:#fafafa; padding:20px 16px; border-radius:0 0 12px 12px;">
      {{events}}
    </div>

    <!-- 푸터 -->
    <div style="text-align:center; font-size:12px; color:#aaa; margin-top:16px; line-height:1.8;">
      <p>Movie Preview Alarm v3</p>
      <p>자동 발송된 메일입니다</p>
    </div>

  </div>
</body>
</html>
